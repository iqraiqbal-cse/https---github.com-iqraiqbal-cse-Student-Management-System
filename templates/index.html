<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management System</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1, h2 { text-align: center; color: #2c3e50; }
        form { display: flex; gap: 10px; margin-bottom: 30px; justify-content: center; background: #eef2f3; padding: 15px; border-radius: 6px; }
        form input { padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
        form button { padding: 10px 20px; background-color: #2ecc71; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        form button:hover { background-color: #27ae60; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background-color: #34495e; color: white; }
        tr:hover { background-color: #f1f1f1; }
        .btn-edit { background-color: #3498db; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; margin-right: 5px; }
        .btn-edit:hover { background-color: #2980b9; }
        .btn-delete { background-color: #e74c3c; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; }
        .btn-delete:hover { background-color: #c0392b; }
    </style>
</head>
<body>

<div class="container">
    <h1>🎓 Student Management System</h1>
    
    <form id="studentForm">
        <input type="text" id="name" placeholder="Full Name" required>
        <input type="number" id="age" placeholder="Age" required min="1">
        <input type="text" id="course" placeholder="Course" required>
        <button type="submit">Add Student</button>
    </form>

    <h2>Student Records</h2>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Age</th>
                <th>Course</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="studentTableBody">
            {% for student in students %}
            <tr id="row-{{ student.id }}">
                <td>{{ student.id }}</td>
                <td>{{ student.name }}</td>
                <td>{{ student.age }}</td>
                <td>{{ student.course }}</td>
                <td>
                    <button class="btn-edit" onclick="editStudent({{ student.id }}, '{{ student.name }}', {{ student.age }}, '{{ student.course }}')">Edit</button>
                    <button class="btn-delete" onclick="deleteStudent({{ student.id }})">Delete</button>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

<script>
    // Form Submit hone par (Add ya Update dono handle karega)
    document.getElementById('studentForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const name = document.getElementById('name').value;
        const age = parseInt(document.getElementById('age').value);
        const course = document.getElementById('course').value;
        const submitBtn = this.querySelector('button');

        const studentData = { name, age, course };

        if (submitBtn.innerText === "Add Student") {
            // 1. CREATE Operation (POST Request)
            const response = await fetch('/students', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(studentData)
            });
            if (response.ok) window.location.reload();
        } else {
            // 2. UPDATE Operation (PUT Request)
            const studentId = submitBtn.getAttribute('data-id');
            const response = await fetch(`/students/${studentId}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(studentData)
            });
            if (response.ok) window.location.reload();
        }
    });

    // Edit button click hone par form me data load karna
    function editStudent(id, name, age, course) {
        document.getElementById('name').value = name;
        document.getElementById('age').value = age;
        document.getElementById('course').value = course;
        
        const submitBtn = document.querySelector('#studentForm button');
        submitBtn.innerText = "Update Student";
        submitBtn.style.backgroundColor = "#3498db";
        submitBtn.setAttribute('data-id', id);
    }

    // 3. DELETE Operation (DELETE Request)
    async function deleteStudent(id) {
        if (confirm("Are you sure you want to delete this student?")) {
            const response = await fetch(`/students/${id}`, {
                method: 'DELETE'
            });
            if (response.ok) {
                document.getElementById(`row-${id}`).remove();
            }
        }
    }
</script>

</body>
</html>
